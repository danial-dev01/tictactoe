<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main>
      <div class="header">
        <h1>TIC <span>TAC</span> TOE</h1>
        <p class="subtitle">Two Players — One Winner</p>
      </div>

      <div class="scoreboard">
        <div class="score-card" id="score-x">
          <div class="score-label">Player X</div>
          <div class="score-value" id="x-score">0</div>
        </div>
        <div class="score-divider">VS</div>
        <div class="score-card" id="score-o">
          <div class="score-label">Player O</div>
          <div class="score-value" id="o-score">0</div>
        </div>
      </div>

      <div class="turn-indicator">
        <span id="turn-text">Player <strong>X</strong>'s Turn</span>
      </div>

      <div class="board-wrapper">
        <div class="boxes">
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
          <button class="box"></button>
        </div>
      </div>

      <div class="winner-banner" id="winner-banner">
        <span id="winner-text"></span>
      </div>

      <button id="reset-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        New Game
      </button>

      <div class="credit">
        Designed &amp; Built by <span>Danial Akram</span>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
